<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ente RIT</title>
    <style>
      body {
        background-color: #161618;
        color: white;
        font-family: sans-serif;
        text-align: center;
        padding-top: 50px;
      }
      .loader {
        border: 4px solid #333;
        border-top: 4px solid #ff3e8e;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 20px auto;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
    <script>
      window.onload = function () {
        // Get the path the user clicked (e.g., /profile/12345)
        var path = window.location.pathname;

        // Instantly try to open the Android App using our custom scheme
        window.location.href = "enterit://app" + path;

        // If the app isn't installed, show this message after 2 seconds
        setTimeout(function () {
          document.getElementById("message").innerText =
            "Please open this link on an Android device with the Ente RIT app installed.";
          document.getElementById("loader").style.display = "none";
        }, 2000);
      };
    </script>
  </head>
  <body>
    <img
      src="https://ui-avatars.com/api/?name=Ente+RIT&background=FF3E8E&color=fff&rounded=true"
      width="80"
      alt="Logo"
    />
    <h2 id="message">Opening Ente RIT App...</h2>
    <div id="loader" class="loader"></div>
  </body>
</html>
