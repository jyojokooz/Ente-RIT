<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Profile</title>

    <!-- ADDED: Font Awesome for social media icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css"
    />

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap");

      body {
        font-family: "Poppins", sans-serif;
        background-color: #121212;
        color: #e0e0e0;
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
      }

      .card {
        background-color: #1e1e1e;
        border-radius: 15px;
        box-shadow: 0 10px B30px rgba(0, 0, 0, 0.5);
        width: 100%;
        max-width: 400px;
        text-align: center;
        padding: 30px;
        box-sizing: border-box;
        border: 1px solid #333;
      }

      #loader {
        border: 4px solid #f3f3f330;
        border-top: 4px solid #facc15;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 50px auto;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .profile-content {
        display: none;
      }

      #profilePhoto {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        border: 4px solid #facc15;
        object-fit: cover;
        background-color: #333;
      }

      #displayName {
        font-size: 1.8em;
        font-weight: 700;
        margin-top: 15px;
        margin-bottom: 5px;
      }

      #username {
        font-size: 1em;
        color: #aaa;
        margin-bottom: 20px;
      }

      /* --- ADDED: Style for the User Status --- */
      #status {
        font-size: 1.1em;
        color: #e0e0e0;
        margin-top: 0;
        margin-bottom: 25px;
        padding: 10px;
        background-color: rgba(250, 204, 21, 0.1); /* Faint yellow background */
        border-left: 3px solid #facc15;
        font-style: italic;
        text-align: left;
      }
      /* ------------------------------------ */

      .info-section {
        text-align: left;
        margin-top: 25px;
        border-top: 1px solid #333;
        padding-top: 20px;
      }

      .info-item {
        margin-bottom: 15px;
      }
      .info-item strong {
        display: block;
        color: #facc15;
        font-size: 0.8em;
        text-transform: uppercase;
        margin-bottom: 3px;
      }
      .info-item p {
        margin: 0;
        font-size: 1em;
        white-space: pre-wrap;
        word-wrap: break-word;
      }

      /* --- ADDED: Styles for the Social Links --- */
      .social-links {
        margin-top: 25px;
        padding-top: 20px;
        border-top: 1px solid #333;
        display: flex;
        justify-content: center;
        gap: 25px; /* Space between icons */
      }
      .social-links a {
        color: #aaa;
        font-size: 24px;
        text-decoration: none;
        transition: color 0.3s ease, transform 0.3s ease;
      }
      .social-links a:hover {
        color: #facc15; /* Highlight color on hover */
        transform: scale(1.1);
      }
      /* -------------------------------------- */

      #errorMessage {
        color: #ff6b6b;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <!-- Loader will show initially -->
      <div id="loader"></div>

      <!-- This content will be shown after data is loaded -->
      <div id="profileContent" class="profile-content">
        <img
          id="profilePhoto"
          src="https://via.placeholder.com/150"
          alt="Profile Photo"
        />
        <h1 id="displayName"></h1>
        <p id="username"></p>

        <!-- ADDED: Container for the User Status -->
        <p id="status" style="display: none"></p>

        <div class="info-section">
          <div class="info-item">
            <strong>Department</strong>
            <p id="department"></p>
          </div>
          <div class="info-item">
            <strong>Bio</strong>
            <p id="bio"></p>
          </div>
        </div>

        <!-- ADDED: Container for the Social Links -->
        <div
          id="socialLinksContainer"
          class="social-links"
          style="display: none"
        >
          <a
            id="linkedinLink"
            href="#"
            target="_blank"
            rel="noopener noreferrer"
            title="LinkedIn"
            style="display: none"
            ><i class="fab fa-linkedin"></i
          ></a>
          <a
            id="githubLink"
            href="#"
            target="_blank"
            rel="noopener noreferrer"
            title="GitHub"
            style="display: none"
            ><i class="fab fa-github"></i
          ></a>
          <a
            id="portfolioLink"
            href="#"
            target="_blank"
            rel="noopener noreferrer"
            title="Portfolio/Website"
            style="display: none"
            ><i class="fas fa-globe"></i
          ></a>
        </div>
      </div>

      <!-- This will be shown if user is not found -->
      <div id="errorMessage" style="display: none"></div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
      // --- IMPORTANT: REPLACE WITH YOUR FIREBASE PROJECT CONFIG ---
      const firebaseConfig = {
        apiKey: "AIzaSyB_-wEKYzjhtRVphrndNPCAzZ-PNBlWwrY",
        authDomain: "fir-auth-bfed9.firebaseapp.com",
        projectId: "fir-auth-bfed9",
        storageBucket: "fir-auth-bfed9.appspot.com",
        messagingSenderId: "267885782991",
        appId: "1:267885782991:web:794d123f36e4ff3ee514ba", // Make sure this is your Web App ID
      };

      // Initialize Firebase
      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();

      // Function to get user ID from the URL path
      function getUserIdFromUrl() {
        const path = window.location.pathname;
        const parts = path.split("/");
        if (parts.length === 3 && parts[1] === "profile") {
          return parts[2];
        }
        return null;
      }

      // Function to fetch and display user data
      async function loadUserProfile() {
        const loader = document.getElementById("loader");
        const profileContent = document.getElementById("profileContent");
        const errorMessage = document.getElementById("errorMessage");

        const userId = getUserIdFromUrl();

        if (!userId) {
          loader.style.display = "none";
          errorMessage.textContent = "Invalid Profile URL.";
          errorMessage.style.display = "block";
          return;
        }

        try {
          const userDocRef = db.collection("users").doc(userId);
          const docSnap = await userDocRef.get();

          if (docSnap.exists) {
            const userData = docSnap.data();

            // Populate the HTML elements with user data
            document.getElementById("profilePhoto").src =
              userData.profilePhotoUrl || "https://via.placeholder.com/150";
            document.getElementById("displayName").textContent =
              userData.displayName || "N/A";
            document.getElementById("username").textContent = `@${
              userData.username || ""
            }`;
            document.getElementById("department").textContent =
              userData.department || "Not specified";
            document.getElementById("bio").textContent =
              userData.bio || "No bio provided.";

            // --- ADDED: Logic to display User Status ---
            const statusElement = document.getElementById("status");
            if (userData.status && userData.status.trim() !== "") {
              statusElement.textContent = `"${userData.status.trim()}"`;
              statusElement.style.display = "block";
            }
            // ------------------------------------------

            // --- ADDED: Logic to display Social Links ---
            const socialContainer = document.getElementById(
              "socialLinksContainer"
            );
            const linkedinLink = document.getElementById("linkedinLink");
            const githubLink = document.getElementById("githubLink");
            const portfolioLink = document.getElementById("portfolioLink");
            let hasSocialLinks = false;

            if (userData.linkedinUrl) {
              linkedinLink.href = userData.linkedinUrl;
              linkedinLink.style.display = "inline-block";
              hasSocialLinks = true;
            }
            if (userData.githubUrl) {
              githubLink.href = userData.githubUrl;
              githubLink.style.display = "inline-block";
              hasSocialLinks = true;
            }
            if (userData.portfolioUrl) {
              portfolioLink.href = userData.portfolioUrl;
              portfolioLink.style.display = "inline-block";
              hasSocialLinks = true;
            }

            if (hasSocialLinks) {
              socialContainer.style.display = "flex"; // Use flex to activate the centering and gap styles
            }
            // ------------------------------------------

            // Show the profile content
            profileContent.style.display = "block";
          } else {
            errorMessage.textContent = "User profile not found.";
            errorMessage.style.display = "block";
          }
        } catch (error) {
          console.error("Error fetching user data:", error);
          errorMessage.textContent =
            "Could not load profile. Please try again later.";
          errorMessage.style.display = "block";
        } finally {
          // Hide the loader
          loader.style.display = "none";
        }
      }

      // Run the function when the page loads
      window.onload = loadUserProfile;
    </script>
  </body>
</html>
